name: Bitcoin Analysis Workflow  # Name of your workflow (can be anything)

# When to run the workflow
on:
  push:
    branches: [ main ]  # Runs when you push to main branch
  pull_request:
    branches: [ main ]  # Runs on PRs targeting main
  workflow_dispatch:     # Allows manual trigger from GitHub UI

# What jobs to run
jobs:
  # Job ID - can be anything (like 'analyze', 'run-script', etc.)
  analyze-bitcoin:
    runs-on: ubuntu-latest  # Type of virtual machine to run on
    
    # Steps in this job
    steps:
    # 1. Checkout your code
    - name: Checkout repository
      uses: actions/checkout@v4
    
    # 2. Setup Python
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'  # Use Python 3.10 or your preferred version
    
    # 3. Install dependencies
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy matplotlib seaborn
        pip install kaggle  # If you need Kaggle API
        pip install -r requirements.txt  # If you have requirements file
    
    # 4. Download Kaggle dataset (if needed)
    - name: Download Bitcoin dataset
      run: |
        # Set up Kaggle credentials
        mkdir -p ~/.kaggle
        echo "${{ secrets.KAGGLE_JSON }}" > ~/.kaggle/kaggle.json
        chmod 600 ~/.kaggle/kaggle.json
        
        # Download dataset (adjust dataset name)
        kaggle datasets download -d your-dataset-name -p data/
        unzip data/*.zip -d data/
    
    # 5. Run your main script
    - name: Run analysis
      run: |
        python your_main_script.py  # Change to your script name
    
    # 6. Save outputs (optional)
    - name: Upload results
      uses: actions/upload-artifact@v4
      with:
        name: bitcoin-analysis-results
        path: |
          output/
          *.csv
          *.png
          *.json
